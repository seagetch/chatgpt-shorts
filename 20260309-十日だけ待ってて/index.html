      gap: var(--spread-gap);
      width: max-content;

    .spread[data-mode="single"] {
      max-width: var(--sheet-width-single);
    }

    .spread[data-mode="double"] {
      max-width: calc(var(--sheet-width-double) * 2 + var(--spread-gap));

    .sheet {
      position: relative;
      width: var(--sheet-width-single);
      height: var(--sheet-height);
      border-radius: 28px;
      border: 1px solid rgba(65, 45, 28, 0.12);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.54), transparent 18%),
        linear-gradient(135deg, var(--paper), var(--paper-edge));
      box-shadow: var(--shadow);
      overflow: hidden;
      flex: 0 0 auto;
    }

    .spread[data-mode="double"] .sheet {
      width: var(--sheet-width-double);
    }

    .sheet::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, transparent, rgba(120, 86, 58, 0.05) 50%, transparent),

    }

    .sheet--left::after,
    .sheet--right::after {
      content: "";
      position: absolute;
      top: 5%;
      bottom: 5%;
      width: 18px;
      pointer-events: none;

    .sheet-text-inner {

    }

    .measure-sheet {
      position: fixed;
      left: -9999px;
      top: 0;
      visibility: hidden;
      overflow: visible;
      pointer-events: none;
      z-index: -1;
    }

    .measure-sheet .sheet-text {
      position: absolute;
      top: var(--sheet-pad-top);
      right: var(--sheet-pad-right);
      width: var(--content-width);
      height: var(--content-height);

  <script>
    const READER_CONFIG = {"columnsPerPage": 20, "rowsPerColumn": 20, "bodyFontMinPx": 12, "bodyFontMaxPx": 18};
    const work = {
      folder: "20260309-十日だけ待ってて",
      title: "十日だけ待ってて",
      cover: "title.jpg",
      blocks: [{"kind": "h1", "text": "十日だけ待ってて"}, {"kind": "p", "text": "「十日だけ待ってて」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "そう言って、湊は笑った。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "笑い方までいつもどおりだったので、栞はほんの少しだけ安心してしまった。\nだから、その言葉が嘘になるかもしれないとは、考えないふりができた。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "夏祭りの夜だった。\n潮見保存区の空には、規則正しく星が置かれ、海には、揺れるたびにきれいすぎる月の道ができていた。地上が焼け、人類のほとんどが量子保存されたあと、この街は長いあいだ「人の心を壊さないための夏」だけで保たれてきた。\n涼しすぎず、暑すぎず、雨は降ってもすぐ止む。\n世界の終わりのあとにつくられた、やさしすぎる八月だった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "その夜、栞と湊は、人のいない校舎の屋上にいた。\n下では祭りの音楽が鳴っていて、屋台の灯りが遠くちらちらしていた。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「十日って、ほんとに？」と栞は聞いた。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "湊は欄干にもたれて、少しだけ肩をすくめた。\n「緊急実体化して、沿岸の培養塔を起こして、転送路の点検して、それで終わり。監督官もそう言ってた」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「監督官の“すぐ”って信用していいの」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「俺の“すぐ”は信用していい」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "栞は笑った。笑ったけれど、そのまま黙った。\n湊が明日の朝、保存区を出ることは決まっていた。\n適合者である彼だけが、緊急用の実体殻に入って現実へ降りられる。\n沿岸の培養塔が動けば、保存された人間をひとりずつ肉体へ戻せる。\n計画書には、短期外勤。\n補足欄には、十日程度。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "十日。\nたったそれだけの文字なのに、どうしてこんなに頼りないのだろうと栞は思った。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「ねえ」と湊が言った。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「ん？」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「帰ってきたらさ」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "その声で、栞は顔を上げた。\n湊は少しだけ照れた顔をしていた。こんな世界になっても、こういう顔をするのだと、栞はそのとき妙に愛しく思った。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「今の続き、していい？」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「今の？」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「……わかるだろ」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "さっきまで二人は、ほとんどキスをするところだった。\n花火が上がるたび、夜空を見るふりをして近づいて、最後の一発の前に、と約束もなく息を止めた。\nその瞬間に呼び出しが入ったのだ。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "栞は少しだけ意地悪をしたくなって、視線をそらした。\n「十日後に覚えてたらね」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「忘れるわけない」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「じゃあ、祭りの最後の一発も残しておく」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「そんなことできるの」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「保守員を甘く見ないで」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "湊は笑って、「じゃあ預ける」と言った。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "そのあと、二人は本当にキスをしなかった。\n少し触れそうになって、でも触れないまま、湊の指先が栞の頬に一度だけ触れた。\nそのぬくもりだけを残して、夏祭りの夜は終わった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "現実の空は、記録よりずっと低かった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "最初に届いた映像で、湊はそう言った。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "《塔は見つかった。半分沈んでたけど、基幹部は生きてる。思ったよりまし。ほんとに十日でいけるかも》"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "映像の向こうで、風が彼の声をちぎっていた。\n保存区の風みたいにやさしくなかった。砂と塩を含んで、肌を削るような風だった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "栞は、その記録を三回見た。\nそれから返事を書いた。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "《十日で帰れなかったら、延長料金を取ります》"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "返事が湊に届いたのは、二十三日後。\n湊の次の映像が栞に届いたのは、さらに十九日後だった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "リアルタイムでは話せない。\n浮標衛星の軌道が合い、地上側にも保存区側にも通信余力があり、嵐が来ていないときだけ、短い記録が往復する。\n同じ言葉を使っていても、同じ現在にはいられなかった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "二通目の映像の湊は、もう少し痩せていた。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "《ごめん。十日じゃ無理だ。培養塔ひとつじゃ足りない。肺を育てる施設も、水の再生系も死んでる。人を戻すには、先に戻すための世界を直さなきゃいけない》"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "そこで彼は少し黙った。\n何か言い訳を探して、結局、やめた顔だった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "《でも、帰る。ちゃんと帰るから》"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "栞は、その「帰る」を見て泣きそうになった。\nそれが約束というより、祈りに近い声だとわかったからだった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "彼女は泣かなかった。\n端末を閉じて、保存区の保守卓へ向かった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "潮見保存区では、長すぎる夏が人の心を少しずつ摩耗させ始めていた。\n保存された人々は眠っているわけではない。学校へ行き、笑い、恋をし、昨日の続きを生きる。\nけれど昨日ばかりが何年も続けば、心はどこかで亀裂を入れる。\nだから保守員は、街に時間を実装する。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "栞は秋をつくった。\n銀杏の落ちる音を資料庫から選び、夕方が少し早く終わるように光量を調整し、制服の袖口にだけわずかな冷たさを足した。\n次の年には冬をつくった。\n吐く息の白さ、カップスープの湯気、指先のかじかみ。\nその次には春をつくった。\n卒業式のあとの、どこか少し泣きそうな風まで。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "街は豊かになった。\nそのかわり計算資源は足りなくなっていった。\n足りないぶんは、保守員自身の記憶を圧縮して埋めるしかなかった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "栞は迷った末に、自分のいくつかの記憶を切り分けた。\n小学校のころの遊具の色。\nいつか読んだ本の結末。\n雨の日の帰り道の遠回り。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "けれど、湊の記憶だけは削れなかった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "屋上の夜。\n頬に触れた指。\n「今の続き、していい？」と聞いた声。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "栞はそれを、不可削除領域にしまった。\n保守員としては褒められない判断だった。\nでも恋人としては、どうしても譲れなかった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "湊は地上で年を重ねた。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "記録の中の彼は、少しずつ日焼けし、少しずつ無口になり、やがて栞より年上の顔になった。\n二年目には土壌技師たちを起こし、四年目には医師たちを起こし、七年目にははじめての沿岸居住区をつくった。\nそのたびに、彼は誰かを先に現実へ戻した。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "栞ではない誰かを。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "それが正しい順番だと、栞は知っていた。\n赤ん坊を取り上げる人が先だ。水を浄化する人が先だ。病気を診る人が先だ。\nそして何より、潮見保存区を最後まで持たせるためには、栞が残らなければならない。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "湊も、それを知っていた。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "《本当は、いちばん先に会いたい》"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "九年目の記録で、彼はそう言った。\n背後には配管だらけの施設があって、空はどこまでも灰色だった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "《でも、君がいないと保存区がもたない。君が守ってる“昨日”があるから、こっちは“明日”をつくれる》"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "栞は、その一文を何度も読み返した。\n読み返しすぎて、文字の輪郭まで覚えた。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "《じゃあ私は、あなたが帰ってくる場所の時間を守る》"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "そう返したあとで、少しだけ書き足した。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "《でも、延長料金はどんどん増えてます》"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "次に届いた記録で、湊はひさしぶりに大きく笑った。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "保存区では、祭りの最後の一発だけが、何年も上がらなかった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "住人たちは「潮見の花火は昔からそういうものだ」と思っていた。\n子どもたちは、「最後の一発は、願いがかなった人にしか見えない」と勝手な噂をつくった。\n栞は否定しなかった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "本当は、それはただの保守停止枠だった。\nでも彼女にとっては違った。\nあの夜の続きと、同じ意味を持っていた。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "終わらせないこと。\nまだ帰ってきていない恋を、きちんと未来へ預けておくこと。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "年を追うごとに、栞の中から細部は少しずつこぼれた。\n湊の制服の袖が何色だったか、思い出せない日が来た。\n屋上に吹いていた風の匂いを、うまく再現できない日も来た。\nそれでも、湊を好きだったことだけは消えなかった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "記憶ではなく、習性みたいに。\n呼吸より少し深いところに残る、心の癖みたいに。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "二十四年目の初夏、記録が届いた。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "端末の向こうにいた湊は、もう若くはなかった。\nこめかみに白いものが混じり、目尻には、栞の知らない年月の線が刻まれていた。\nけれど、栞を呼ぶ声だけは、最初の夜と同じだった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "《海辺で祭りができるようになった》"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "栞は息を止めた。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "映像の向こうで、ほんとうの海が揺れていた。\n加工されていない波の反射は、保存区の海より少しだけ下手で、少しだけまぶしかった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "《沿岸の転送設備、ようやく安定した。最後の一人を出せる》"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "そこで湊は笑った。\n昔より静かな笑い方だった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "《次は君だ、栞》"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "栞は端末に触れた。\n画面越しの頬には触れられない。\nそれでも触れるように、指先を置いた。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "《最後の一発、まだ残ってる》"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "短い返事を書いて、送信した。\nそのあと、彼女はひとりで少し笑った。\n延長料金は、もう数えきれない。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "実体化は痛かった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "息を吸うことがこんなに難しいとは、栞は知らなかった。\n肺が空気を覚え、骨が重力を思い出し、心臓が「脈を打つ」という仕事を再開する。\n視界が白くゆれて、涙が勝手に出た。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「栞」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "名前を呼ばれて、彼女は目を開けた。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "そこに湊がいた。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "会ったことのない顔だった。\nそれなのに、ひと目でわかった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "記録の中で見てきたより、ずっと近くて、ずっと静かだった。\n手は大きく、節くれ立ち、日に焼けていた。\n目の下に疲れの影があり、少しだけ白くなった髪が風に揺れていた。\n二十四年という時間が、その人の上にたしかに積もっていた。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "湊は、ひどく緊張した顔で言った。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「……遅くなった」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "栞は、うまく声が出なかった。\nだから先に手を伸ばした。\n指先で、彼のこめかみの白いところに触れる。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "あたたかかった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「十日って」と栞はやっと言った。「人をこんなに大人にするんだね」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "湊が、少し泣きそうな顔で笑った。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「ごめん」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「ほんとにね」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「怒ってる？」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "栞は首を振った。\n怒っていなかった。\n待たされたと思ったことも、たしかにあった。寂しくてたまらない夜も、何百回もあった。\nでもその全部を越えて、今、目の前にいる人が現実の重さを背負ってここまで来たのだとわかった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「会いたかった」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "その一言を言うのに、栞は二十四年ぶんの時間を使った気がした。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "湊は少しだけ目を伏せてから、同じくらい静かな声で返した。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「俺も。ずっと」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "その夜、沿岸の小さな祭りへ二人は行った。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "提灯は不揃いで、屋台の鉄板は少し傾いていて、焼きそばは保存区のものよりずっと焦げていた。\nでも空気は湿っていて、潮の匂いがして、人々の笑い声には生身の喉の震えがあった。\n何もかもが不完全で、だからこそ本物だった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "栞は新しい下駄にまだ慣れなくて、二度ほどつまずきかけた。\nそのたびに湊が手を貸した。\n昔のように自然ではない。昔よりずっと慎重で、少しぎこちない。\n二人のあいだには、会えなかった年月がちゃんとあった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "けれど、その不器用ささえ栞には愛しかった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "海辺に出ると、遠くで一発目の花火が上がった。\n遅れて、腹の底に響く音が来る。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "二発目。三発目。\n光が開くたび、湊の横顔が明るくなって、また暗くなった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「栞」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「ん？」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「今の続き、していい？」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "その言い方が、二十四年前とまったく同じで、栞は思わず笑ってしまった。\n泣きそうなのに、先に笑いがこぼれた。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「覚えてたんだ」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「忘れるわけないだろ」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "栞は彼を見上げた。\n若いころより少し低くなった声。\n風にさらされた肌。\n長い時間を生きてきた人の目。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "それでも確かに、あの夜、屋上で頬に触れた少年のままだった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「延長料金、高いよ」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「払う」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「利子もついてる」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「一生かけて払う」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "栞は、もう一度笑った。\nそれから、そっと彼の胸元をつかんだ。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「じゃあ、最後の一発までに」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "ちょうどそのとき、夜空へ、長いあいだ上がらなかった最後の花火が昇っていった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "潮見保存区で何年も空白のままだった、あの一発。\n終わらせないために残しておいた、恋のつづき。\n人類が記録から肉体へ戻る、その最後の夜のために取っておいた光。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "花が開く寸前、湊が身を屈めた。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "今度は、呼び出しも入らなかった。\n誰にも止められなかった。\n二十四年遅れの口づけは、驚くほど静かで、あたたかかった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "空で花火が開く。\n白く、金にほどけて、海に光が落ちる。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "遅れてくる音を聞きながら、栞は思った。\n十日なんて、とうに過ぎていた。\n夏も、約束も、二人の年齢も、何もかも予定どおりではなかった。\nそれでも、好きだという気持ちだけは、壊れずにここまで来た。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "長さの違う二人の時間が、その一瞬だけ、同じ夜の中でちゃんと重なった。"}, {"kind": "spacer", "text": ""}],
    };

    const state = {
      pages: [],
      currentPageIndex: 0,
      spreadMode: false,
    };

    const readerFrame = document.querySelector(".reader-frame");
    const spreadHost = document.getElementById("spreadHost");
    const pageIndicator = document.getElementById("pageIndicator");
    const prevButton = document.getElementById("prevButton");
    const nextButton = document.getElementById("nextButton");

    initialize();

    async function initialize() {
      bindEvents();
      await waitForFonts();
      refreshLayout(true);
      goToPage(parseHashPage(), false);
    }

    async function waitForFonts() {
      const timeout = new Promise((resolve) => window.setTimeout(resolve, 8000));
      const pending = [];
      const fontStylesheet = document.getElementById("readerFontStylesheet");

      if (fontStylesheet && !fontStylesheet.sheet) {
        pending.push(new Promise((resolve) => {
          const finish = () => {
            fontStylesheet.removeEventListener("load", finish);
            fontStylesheet.removeEventListener("error", finish);
            resolve();
          };

          fontStylesheet.addEventListener("load", finish, { once: true });
          fontStylesheet.addEventListener("error", finish, { once: true });
        }));
      }

      if (document.fonts) {
        pending.push(
          Promise.all([
            document.fonts.ready.catch(() => undefined),
            document.fonts.load('400 16px "Shippori Mincho"').catch(() => undefined),
            document.fonts.load('500 16px "Shippori Mincho"').catch(() => undefined),
            document.fonts.load('700 16px "Shippori Mincho"').catch(() => undefined),
          ]),
        );
      }

      if (pending.length === 0) {
        return;
      }

      await Promise.race([
        Promise.all(pending),
        timeout,
      ]);
    }

    function bindEvents() {
      nextButton.addEventListener("click", () => goToPage(getNextIndex()));
      prevButton.addEventListener("click", () => goToPage(getPrevIndex()));

      document.addEventListener("keydown", (event) => {
        if (event.key === "ArrowLeft") {
          event.preventDefault();
          goToPage(getNextIndex());
        } else if (event.key === "ArrowRight") {
          event.preventDefault();
          goToPage(getPrevIndex());
        } else if (event.key === "Home") {
          event.preventDefault();
          goToPage(0);
        } else if (event.key === "End") {
          event.preventDefault();
          goToPage(state.spreadMode ? getLastSpreadStartIndex() : state.pages.length - 1);
        }
      });

      let touchStartX = 0;
      let touchStartY = 0;

      spreadHost.addEventListener("touchstart", (event) => {
        const touch = event.changedTouches[0];
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
      }, { passive: true });

      spreadHost.addEventListener("touchend", (event) => {
        const touch = event.changedTouches[0];
        const dx = touch.clientX - touchStartX;
        const dy = touch.clientY - touchStartY;

        if (Math.abs(dx) < 40 || Math.abs(dx) < Math.abs(dy)) {
          return;
        }

        if (dx < 0) {
          goToPage(getNextIndex());
        } else {
          goToPage(getPrevIndex());
        }
      }, { passive: true });

      window.addEventListener("resize", () => {
        const currentIndex = state.currentPageIndex;
        refreshLayout(true);
        goToPage(currentIndex, false);
      });

      window.addEventListener("hashchange", () => {
        goToPage(parseHashPage(), false);
      });
    }

    function refreshLayout(forceRepaginate) {
      const nextSpreadMode = shouldUseSpreadMode();
      const modeChanged = nextSpreadMode !== state.spreadMode;

      state.spreadMode = nextSpreadMode;
      spreadHost.dataset.mode = state.spreadMode ? "double" : "single";
      applyLayoutMetrics();

      if (forceRepaginate || modeChanged || state.pages.length === 0) {
        state.pages = paginateWork(work);
      }
    }

    function shouldUseSpreadMode() {
      return window.innerWidth >= 1100 && window.innerWidth > window.innerHeight * 1.12;
    }

    function applyLayoutMetrics() {
      const root = document.documentElement;
      const compact = window.innerWidth <= 1100;
      const maxFontWidthFillRatio = 0.8;
      const outerPadding = compact ? 32 : 48;
      const verticalPadding = compact ? 32 : 48;
      const spreadGap = compact ? 16 : 24;
      const footerReserve = compact ? 92 : 104;
      const sheetHeight = Math.max(360, window.innerHeight - footerReserve - verticalPadding);
      const aspectWidth = Math.floor(sheetHeight * 3 / 4);
      const maxSingleWidth = Math.max(320, window.innerWidth - outerPadding);
      const maxDoubleWidth = Math.max(220, Math.floor((window.innerWidth - outerPadding - spreadGap) / 2));
      const sheetWidthSingle = Math.min(aspectWidth, maxSingleWidth);
      const sheetWidthDouble = Math.min(aspectWidth, maxDoubleWidth);
      const activeSheetWidth = state.spreadMode ? sheetWidthDouble : sheetWidthSingle;

      const targetLinesPerPage = Math.max(1, READER_CONFIG.columnsPerPage);
      const targetCharsPerLine = Math.max(1, READER_CONFIG.rowsPerColumn);
      const minFont = Number(READER_CONFIG.bodyFontMinPx) || 12;
      const maxFont = Number(READER_CONFIG.bodyFontMaxPx) || 18;
      const lineHeight = compact ? 1.22 : 1.24;
      const letterSpacingEm = 0.03;
      const baseTopPadding = (compact ? 26 : 34) + (compact ? 8 : 10);
      const baseBottomPadding = compact ? 26 : 34;
      const baseSidePadding = compact ? 28 : 40;
      const maxContentHeight = Math.max(240, sheetHeight - baseTopPadding - baseBottomPadding);
      const maxContentWidth = Math.max(160, activeSheetWidth - baseSidePadding * 2);

      const fontSizeFromWidth = maxContentWidth / (targetLinesPerPage * lineHeight);
      const fontSizeFromHeight = maxContentHeight / (targetCharsPerLine * (1 + letterSpacingEm));
      const fontSize = clamp(Math.min(fontSizeFromWidth, fontSizeFromHeight), minFont, maxFont);
      const linePitch = fontSize * lineHeight;
      const contentHeight = Math.round(maxContentHeight);
      const naturalContentWidth = Math.round(linePitch * targetLinesPerPage);
      const minFilledContentWidth = Math.round(maxContentWidth * maxFontWidthFillRatio);
      const isAtMaxFont = fontSize >= maxFont - 0.01;
      const contentWidth = Math.min(
        maxContentWidth,
        isAtMaxFont ? Math.max(naturalContentWidth, minFilledContentWidth) : naturalContentWidth,
      );

      const topPadding = baseTopPadding;
      const bottomPadding = baseBottomPadding;
      const extraHorizontal = Math.max(0, activeSheetWidth - contentWidth);
      const sidePadding = Math.max(baseSidePadding, Math.floor(extraHorizontal / 2));

      root.style.setProperty("--sheet-width-single", `${sheetWidthSingle}px`);
      root.style.setProperty("--sheet-width-double", `${sheetWidthDouble}px`);
      root.style.setProperty("--sheet-height", `${sheetHeight}px`);
      root.style.setProperty("--sheet-pad-top", `${topPadding}px`);
      root.style.setProperty("--sheet-pad-bottom", `${bottomPadding}px`);
      root.style.setProperty("--sheet-pad-right", `${sidePadding}px`);
      root.style.setProperty("--sheet-pad-left", `${sidePadding}px`);
      root.style.setProperty("--content-height", `${contentHeight}px`);
      root.style.setProperty("--content-width", `${contentWidth}px`);
      root.style.setProperty("--lines-per-page", `${targetLinesPerPage}`);
      root.style.setProperty("--body-font-size", `${fontSize.toFixed(2)}px`);
      root.style.setProperty("--body-line-height", lineHeight.toFixed(3));
      root.style.setProperty("--line-pitch", `${linePitch.toFixed(2)}px`);
      root.style.setProperty("--body-letter-spacing", `${letterSpacingEm.toFixed(3)}em`);
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function parseHashPage() {
      const raw = window.location.hash.replace(/^#/, "");
      if (!raw) {
        return 0;
      }

      const page = Number.parseInt(raw, 10);
      return Number.isNaN(page) ? 0 : Math.max(page - 1, 0);
    }

    function normalizePageIndex(index) {
      const maxIndex = Math.max(state.pages.length - 1, 0);
      let normalized = Math.min(Math.max(index, 0), maxIndex);

      if (state.spreadMode && normalized > 0 && normalized % 2 !== 0) {
        normalized -= 1;
      }

      return normalized;
    }

    function getNextIndex() {
      if (!state.spreadMode) {
        return Math.min(state.currentPageIndex + 1, state.pages.length - 1);
      }

      return Math.min(state.currentPageIndex + 2, getLastSpreadStartIndex());
    }

    function getPrevIndex() {
      if (!state.spreadMode) {
        return Math.max(state.currentPageIndex - 1, 0);
      }

      return Math.max(state.currentPageIndex - 2, 0);
    }

    function getLastSpreadStartIndex() {
      const maxIndex = Math.max(state.pages.length - 1, 0);
      return maxIndex > 0 && maxIndex % 2 !== 0 ? maxIndex - 1 : maxIndex;
    }

    function goToPage(index, updateHash = true) {
      if (!state.pages.length) {
        return;
      }

      state.currentPageIndex = normalizePageIndex(index);
      renderSpread();
      updateControls();

      if (updateHash) {
        history.replaceState(null, "", `#${state.currentPageIndex + 1}`);
      }
    }

    function updateControls() {
      const visiblePages = getVisiblePageNumbers();
      pageIndicator.textContent = visiblePages.length === 1
        ? `${visiblePages[0]} / ${state.pages.length}`
        : `${visiblePages[0]}-${visiblePages[1]} / ${state.pages.length}`;

      prevButton.disabled = state.currentPageIndex <= 0;
      nextButton.disabled = state.spreadMode
        ? state.currentPageIndex >= getLastSpreadStartIndex()
        : state.currentPageIndex >= state.pages.length - 1;
    }

    function getVisiblePageNumbers() {
      if (!state.spreadMode) {
        return [state.currentPageIndex + 1];
      }

      const leftIndex = state.currentPageIndex + 1;
      if (leftIndex < state.pages.length) {
        return [state.currentPageIndex + 1, leftIndex + 1];
      }

      return [state.currentPageIndex + 1];
    }

    function renderSpread() {
      const nodes = [];

      if (state.spreadMode) {
        nodes.push(renderSheet(state.currentPageIndex, "right"));
        nodes.push(renderSheet(state.currentPageIndex + 1, "left"));
      } else {
        nodes.push(renderSheet(state.currentPageIndex, "right"));
      }

      spreadHost.replaceChildren(...nodes);
      readerFrame.scrollTop = 0;
      readerFrame.scrollLeft = 0;
    }

    function renderSheet(pageIndex, side) {
      if (pageIndex >= state.pages.length) {
        return createBlankSheet(side);
      }

      const page = state.pages[pageIndex];
      const sheet = document.createElement("article");
      sheet.className = `sheet sheet--${side}`;

      if (page.type === "cover") {
        const cover = document.createElement("div");
        cover.className = "sheet-cover";

        const img = document.createElement("img");
        img.src = work.cover;
        img.alt = work.title + " の表紙";

        const meta = document.createElement("div");
        meta.className = "cover-meta";

        const title = document.createElement("span");
        title.textContent = work.title;

        const pageText = document.createElement("span");
        pageText.textContent = "表紙";

        meta.append(title, pageText);
        cover.append(img, meta);
        sheet.append(cover);
        return sheet;
      }

      const text = document.createElement("div");
      text.className = "sheet-text";
      renderBlocksIntoContainer(text, page.blocks);
      sheet.append(text);
      return sheet;
    }

    function createBlankSheet(side) {
      const sheet = document.createElement("article");
      sheet.className = `sheet sheet--blank sheet--${side}`;
      return sheet;
    }

    function renderBlock(block) {
      if (block.kind === "spacer") {
        const element = document.createElement("div");
        element.className = "spacer";
        return element;
      }

      const tag = /^h[1-3]$/.test(block.kind) ? block.kind : "p";
      const element = document.createElement(tag);
      element.textContent = block.text;
      return element;
    }

    function renderBlocksIntoContainer(container, blocks, isMeasure = false) {
      const inner = document.createElement("div");
      inner.className = "sheet-text-inner";
      if (isMeasure) {
        inner.dataset.measure = "true";
      }

      for (const block of blocks) {
        inner.append(renderBlock(block));
      }

      container.replaceChildren(inner);
      return inner;
    }

    function paginateWork(currentWork) {
      const pages = [{ type: "cover" }];
      const measureSheet = document.createElement("div");
      measureSheet.className = "sheet measure-sheet";

      const measureText = document.createElement("div");
      measureText.className = "sheet-text";
      measureSheet.append(measureText);
      document.body.append(measureSheet);

      let currentBlocks = [];

      for (const block of currentWork.blocks) {
        if (fitsBlocksInPage(measureText, [...currentBlocks, block])) {
          currentBlocks.push(block);
          continue;
        }

        if (currentBlocks.length > 0) {
          pages.push({ type: "text", blocks: currentBlocks });
          currentBlocks = [];
        }

        if (fitsBlocksInPage(measureText, [block])) {
          currentBlocks.push(block);
          continue;
        }

        if (block.kind === "p") {
          for (const splitText of splitParagraphAcrossPages(measureText, block.text)) {
            pages.push({ type: "text", blocks: [{ kind: "p", text: splitText }] });
          }
          continue;
        }

        pages.push({ type: "text", blocks: [block] });
      }

      if (currentBlocks.length > 0) {
        pages.push({ type: "text", blocks: currentBlocks });
      }

      measureSheet.remove();
      return pages;
    }

    function fitsBlocksInPage(measureText, blocks) {
      renderBlocksIntoContainer(measureText, blocks, true);
      return (
        measureText.scrollWidth <= measureText.clientWidth + 1 &&
        measureText.scrollHeight <= measureText.clientHeight + 1
      );
    }

    function splitParagraphAcrossPages(measureText, text) {
      const chunks = [];
      let remaining = text.trim();

      while (remaining) {
        const segment = largestFittingSegment(measureText, remaining);
        if (!segment || segment.length >= remaining.length) {
          chunks.push(remaining);
          break;
        }

        const nextRemaining = remaining.slice(segment.length).trim();
        const adjusted = rebalanceLeadingPunctuation(segment.trim(), nextRemaining);
        chunks.push(adjusted.current);
        remaining = adjusted.remaining;
      }

      return chunks.filter(Boolean);
    }

    function largestFittingSegment(measureText, text) {
      const sentenceTokens = splitIntoSentenceTokens(text);
      if (sentenceTokens.length > 1) {
        const sentenceMatch = largestFittingTokenPrefix(measureText, sentenceTokens);
        if (sentenceMatch) {
          return sentenceMatch;
        }
      }

      const charTokens = Array.from(text);
      return largestFittingTokenPrefix(measureText, charTokens) || text;
    }

    function largestFittingTokenPrefix(measureText, tokens) {
      let low = 1;
      let high = tokens.length;
      let best = "";

      while (low <= high) {
        const mid = Math.floor((low + high) / 2);
        const candidate = tokens.slice(0, mid).join("").trim();

        if (!candidate) {
          low = mid + 1;
          continue;
        }

        if (fitsBlocksInPage(measureText, [{ kind: "p", text: candidate }])) {
          best = candidate;
          low = mid + 1;
        } else {
          high = mid - 1;
        }
      }

      return best;
    }

    function splitIntoSentenceTokens(text) {
      const rawTokens = text.match(/[^。！？!?]+[。！？!?]?["」』）】]*|.+$/gu);
      return rawTokens ? rawTokens.map((token) => token.trim()).filter(Boolean) : [text];
    }

    function rebalanceLeadingPunctuation(current, remaining) {
      if (!remaining) {
        return { current, remaining: "" };
      }

      const chars = Array.from(remaining);
      const leading = [];
      while (chars.length && "、。，．！？!?」』）】".includes(chars[0])) {
        leading.push(chars.shift());
      }

      if (leading.length === 0) {
        return { current, remaining };
      }

      return {
        current: current + leading.join(""),
        remaining: chars.join("").trimStart(),
      };
    }
  </script>
</body>
