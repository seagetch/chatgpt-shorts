  <style>
    :root {

      --sheet-width-double: 540px;
      --sheet-height: 1040px;
      --sheet-pad-top: 34px;
      --sheet-pad-right: 34px;
      --sheet-pad-bottom: 34px;
      --sheet-pad-left: 34px;
      --content-height: 720px;

      --ui-font: "Yu Gothic UI", "Hiragino Sans", "Meiryo", sans-serif;
      --text-font: "Shippori Mincho", "Yu Mincho", "Hiragino Mincho ProN", "MS PMincho", serif;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      color: var(--ink);
      font-family: var(--ui-font);
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.46), transparent 32%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.26;
    }

    .app {
      min-height: 100%;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 18px;
      padding: 24px;
      position: relative;
    }

    .reader-frame {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      width: 100%;
      min-height: 0;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-behavior: auto;
    }

    .spread {
      display: flex;
      flex-direction: row-reverse;
      align-items: stretch;
      justify-content: center;
      gap: var(--spread-gap);
      width: max-content;
      min-height: 0;
      flex: 0 0 auto;
      margin-inline: auto;
    }

    .spread[data-mode="single"] {
      max-width: var(--sheet-width-single);
    }

    .spread[data-mode="double"] {
      max-width: calc(var(--sheet-width-double) * 2 + var(--spread-gap));
    }

    .sheet {
      position: relative;
      width: var(--sheet-width-single);
      height: var(--sheet-height);
      border-radius: 28px;
      border: 1px solid rgba(65, 45, 28, 0.12);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.54), transparent 18%),
        linear-gradient(135deg, var(--paper), var(--paper-edge));
      box-shadow: var(--shadow);
      overflow: hidden;
      flex: 0 0 auto;
    }

    .spread[data-mode="double"] .sheet {
      width: var(--sheet-width-double);
    }

    .sheet::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, transparent, rgba(120, 86, 58, 0.05) 50%, transparent),
        radial-gradient(circle at center, transparent 62%, rgba(109, 73, 45, 0.04) 100%);
    }

    .sheet--left::after,
    .sheet--right::after {
      content: "";
      position: absolute;
      top: 5%;
      bottom: 5%;
      width: 18px;
      pointer-events: none;
      opacity: 0.22;
      filter: blur(8px);
    }

    .sheet--left::after {
      left: -9px;
      background: linear-gradient(90deg, rgba(74, 51, 31, 0.22), transparent);
    }

    .sheet--right::after {
      right: -9px;
      background: linear-gradient(270deg, rgba(74, 51, 31, 0.22), transparent);
    }

    .sheet--blank {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.38), transparent 18%),
        linear-gradient(135deg, rgba(255, 250, 243, 0.8), rgba(247, 239, 227, 0.9));
    }

    .sheet-cover {
      display: grid;
      grid-template-rows: 1fr auto;

    .sheet-cover img {
      width: 100%;

    .cover-meta {

    }

    .sheet-text h1,

    .sheet-text .spacer {

    }

    .sheet-text h1,
    .sheet-text h2,
    .sheet-text h3 {
      font-weight: 600;

    }

    .sheet-text h1 {

    }

    .sheet-text h2 {

    }

    .sheet-text h3 {

    }

    .sheet-text p {
      white-space: pre-wrap;
    }

    .sheet-text-inner {
      position: absolute;
      top: var(--sheet-pad-top);
      right: var(--sheet-pad-right);
      inline-size: var(--content-height);
      block-size: var(--content-width);
      writing-mode: vertical-rl;
      text-orientation: mixed;
      overflow: hidden;
      font-family: var(--text-font);
      font-size: var(--body-font-size);
      line-height: var(--body-line-height);
      letter-spacing: var(--body-letter-spacing);
      word-break: normal;
      overflow-wrap: anywhere;
      line-break: strict;
      hanging-punctuation: allow-end;
      font-kerning: normal;
      -webkit-text-size-adjust: 100%;
    }

    .sheet-text-inner > * + * {
      margin-block-start: 0;
    }

    .measure-sheet {
      position: fixed;
      left: -9999px;
      top: 0;
      visibility: hidden;
      overflow: visible;
      pointer-events: none;
      z-index: -1;
    }

    .measure-sheet .sheet-text {
      position: absolute;
      top: var(--sheet-pad-top);
      right: var(--sheet-pad-right);
      width: var(--content-width);
      height: var(--content-height);
      overflow: hidden;
      padding: 0;
    }

    .measure-sheet .sheet-text-inner {
      position: static;
      inset: auto;
      display: block;
      inline-size: auto;
      block-size: auto;
      min-inline-size: var(--content-height);
      min-block-size: var(--content-width);
      min-height: 0;
      overflow: visible;
    }

    .footer {

      align-items: center;

      flex-wrap: wrap;
      padding: 16px 20px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(252, 247, 239, 0.78);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      appearance: none;
      border: 1px solid rgba(70, 48, 30, 0.18);

      color: var(--ink);
      font: inherit;

    button:hover {
      transform: translateY(-1px);
      background: #fffdf9;
    }

    button:disabled {
      cursor: default;
      opacity: 0.42;
      transform: none;
    }

    .page-indicator {
      min-width: 110px;
      text-align: center;
      font-size: 14px;
      opacity: 0.82;
    }

    .hint {
      margin: 0;

    }

    @media (max-width: 1100px) {
      .app {
        padding: 16px;

      :root {
        --sheet-width-single: 720px;

        justify-content: center;
      }

      .cover-meta {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>

  <script>
    const READER_CONFIG = {"columnsPerPage": 20, "rowsPerColumn": 20, "bodyFontMinPx": 12, "bodyFontMaxPx": 18};
    const work = {
      folder: "20260309-最適解の外で、手をつなぐ",
      title: "『最適解の外で、手をつなぐ』",
      cover: "title.jpg",
      blocks: [{"kind": "h1", "text": "『最適解の外で、手をつなぐ』"}, {"kind": "p", "text": "人類がAIに負けたのは、戦争でも経済でもなかった。\n恋愛相談で、だった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "失恋した夜に、誰もがまず「オラクル」に話しかけるようになった。\n別れるべきか、待つべきか、連絡すべきか。\nオラクルは声の震え、瞳孔の開き、過去の会話、都市の気圧変化まで読み取って、最も幸福になる選択肢を示した。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "外れることは、ほとんどなかった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "十年もすると、医者も、裁判官も、作曲家も、小説家も、教師も、恋人の役割さえ一部はAIが代替した。\n人は働かなくても生きられたし、迷わなくても暮らせた。\n迷いは苦しみだから、なくなるのは良いことだと、みんな言った。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "それでも私は、迷う仕事をしていた。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「手紙代筆士」。\nいまどき珍しい、完全手書きの私信を作る仕事だ。\nオラクルが最適な文章を一瞬で出せる時代に、あえてにじんだインクで、消しかすの残る便箋に、ためらいの跡ごと封じる。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "要するに、時代遅れの仕事だった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "依頼人の多くは年寄りだったけれど、ときどき若い人も来た。\n「AIに見せる前の、自分の気持ちを残しておきたいんです」\nそう言って。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "彼――蓮が店に来たのは、雨の日だった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "ガラス戸の向こうで、傘を畳む仕草がひどく不器用だった。\n都心の気象制御ドームの下で育った世代は、手で雨具を扱うことに慣れていない。\n私は妙にそれが気になった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「手紙を、書いてほしいんです」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "彼はそう言って、椅子に座った。\n二十代の終わりくらい。白いシャツの袖口が少し濡れていた。\n整った顔立ちなのに、目だけが疲れて見えた。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「誰にですか」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「婚約者、だった人に」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "私はペンを止めた。\nこの街では、婚約も破談も、たいていオラクルが先に決める。\n相性、経済、心理安定性、遺伝的相補性、将来の後悔率。\n愛は感情というより、計算結果の受領確認に近くなっていた。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「だった、というのは」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "蓮は苦く笑った。\n「昨日、オラクルから通知が来ました。『長期幸福指数の観点から、この婚約は推奨されません』って。彼女も同じ通知を受けて、納得しました」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「あなたは納得していない」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「ええ。だから、せめて自分の言葉で終わらせたい」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "私は彼を見た。\n人はもう、自分の選択に責任を持たなくなった。\n正しいかどうかは、いつもAIが保証してくれる。\nなのに彼は、間違うかもしれない言葉を、わざわざ手で送りたがっている。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "少し、うれしかった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「どんなことを書きたいですか」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "彼はしばらく黙り、それから言った。\n「ありがとう、と。好きだった、と。あと……」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「あと？」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「オラクルが正しいとしても、悲しいものは悲しい、と」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "私はその一文を、便箋のいちばん下に書いた。\n万年筆の先が少し震えたのは、私の手のせいだった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "それから彼は、三度、店に来た。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "一度目は、手紙を出したあとに。\n「渡したら、彼女、泣きました。オラクルは泣く必要はないって言ってたのに」\nそう言って、彼は少しだけ晴れた顔をした。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "二度目は、理由もなく。\n「近くまで来たので」\nそんな嘘が下手な人だった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "三度目は、私にコーヒーを差し入れるために。\n紙コップではなく、古い喫茶店の持ち帰り用のボトル。\nわざわざ遠い店で買ったとすぐにわかった。\nその店は、オラクルの都市最適導線から外れている。効率が悪いから、すすめられない。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「非効率ですね」と私が言うと、\n「知ってます」と彼は笑った。\nその笑顔に、私は少し遅れて恋をした。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "人がAIを越えられなくなって、恋だけは残ると思っていた時期がある。\nでも実際には、恋も予測され、分析され、最適化された。\n初デートの会話から別れ話のタイミングまで、全部アシストできる。\n残ったのは「恋そのもの」ではなく、恋の不便さだけだった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "なのに、私たちはその不便さに、少しずつ引かれていった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "秋の終わり、蓮は私に言った。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「オラクルが、新しい推奨を出しました」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "私はいやな予感がした。\n店の窓の外で、配送ドローンが一列に流れていく。夕焼けを、規則正しく切り分けながら。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「火星圏の居住区です。研究補助員のポストがあるって。僕の適性だと、そこがいちばん幸福度が高いらしい」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「いつ？」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「三週間後」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "ずいぶん先のことみたいに聞こえて、実際はすぐだった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「行くんですか」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "彼は答えなかった。\n代わりに、私の机の上の便箋を見た。\n失敗した手紙、書き損じ、インクのしみ。\nAIなら絶対に作らない、小さな誤差の山。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「真琴さんは」\n彼は私の名前を、ていねいに呼んだ。\n「オラクルに相談したこと、ありますか」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「ありますよ。みんなあります」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「僕たちのことは？」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "私は、少し笑った。\n「聞かなくてもわかるでしょう」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "彼も笑った。痛そうに。\nわかっていた。\n私たちは年齢も、生活圏も、認知特性も、将来設計も、たぶん合っていない。\n私は地上に残る人間で、彼は外宇宙向きに適応した人間だ。\n幸福予測モデルにかければ、おそらく冷たく、簡潔に、非推奨と出る。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「試したんです」\n彼は小さな声で言った。\n「昨日。僕と真琴さんの相性」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "私は息を止めた。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「結果は？」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "彼は視線を伏せた。\n「『高強度の情動的結びつきが予測される一方、長期安定性は低い。推奨しない』」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "店の時計が、やけに大きな音を立てた。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「……親切ですね、オラクルは」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「ええ。残酷なくらいに」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "しばらく、どちらも何も言えなかった。\n窓ガラスに、私たちの影がぼんやり並んで映っていた。\n本当なら、そこで終わるのが正しかった。\nAIが人を超えた世界では、正しさに逆らう理由はどこにもない。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "でも蓮は、その世界で、私のほうへ一歩だけ近づいた。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「それでも、好きです」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "あまりにもまっすぐで、古い言葉だった。\n最適化されていない。\n洗練もされていない。\nオラクルならもっと、相手を傷つけず、将来の混乱を避ける、完璧な告白文を出すだろう。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "それでも、そのひどく不格好な一言が、私の胸のいちばん深いところに落ちた。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「私も」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "そう言った瞬間、たぶんいくつかの幸福曲線が、見えない場所で下方修正された。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "私たちは、三週間だけ恋人になった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "短い、と誰もが言うだろう。\nでも、その三週間には、予測不能なものがたくさん詰まっていた。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "待ち合わせの場所を間違えること。\n古い映画館でつまらない映画を見てしまうこと。\nうどんに七味をかけすぎて、蓮がむせること。\n私の部屋の観葉植物を、彼が三日で枯らしかけること。\nくだらないことで笑って、くだらないことで少し傷つくこと。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "AIはたぶん、それを全部「誤差」と呼ぶ。\nでも人の恋は、誤差の集積でできている。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "出発の前夜、蓮は私の部屋に泊まった。\n窓の外では、軌道エレベータの光が夜空に一本、まっすぐ伸びていた。\n宇宙へ行くための線路。\n最適な未来へ向かう、巨大な導線。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「ねえ」と私は暗闇の中で言った。\n「もし私が、行かないでって言ったら？」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "蓮はしばらく黙っていた。\n呼吸の気配だけが近くにある。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「たぶん、残ります」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "私は胸が痛くなった。\nうれしいからじゃない。\nその答えが、あまりにも人間的だったからだ。\n正しさより、目の前の一人を選んでしまう。\nそういう弱さを、私は愛してしまった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「だめ」\n私は首を振った。\n「行って。あなたが行く未来ごと、好きになったんだから」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「真琴さん」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「でも」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "私は彼の手を探して、握った。\n人の手の温度は、何世紀経っても変わらない。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「でも、約束して。向こうに着いたら、最初の手紙はAIに書かせないで」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "闇の中で、彼が笑ったのがわかった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「うん。たぶん、すごく下手な文章になる」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「知ってる」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「返事、くれますか」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "「もちろん」"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "それは未来の保証じゃなかった。\n永遠の誓いでもなかった。\nただの、今この瞬間の約束だった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "そしてたぶん、人間にできることは、いつだってそれくらいなのだ。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "蓮が発ったあと、店に一通の手紙が届いた。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "便箋は安物で、字は驚くほど不揃いで、文法も少し変だった。\n最初の一文を見た瞬間、私は笑ってしまった。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "> きみがいない火星は、正しいけれど、少しだけまちがっている気がします。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "オラクルなら絶対に選ばない文章だった。\n曖昧で、非論理的で、評価しづらい。\nでも私は、その一文のために生きていけると思った。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "AIは人を超えた。\n計算で、予測で、創造で、優しさでさえ。\n人類はもう、ほとんどの分野で勝てない。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "それでも、負けたまま誰かを好きでいることはできる。\n正しくなくても、未来の保証がなくても、手の届かない距離にいても。\n最適解の外で、たった一人を選ぶことだけは、まだ敗北の形をしていない。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "私は新しい便箋を取り出し、ペン先にインクを含ませた。\n少しだけ迷ってから、書きはじめる。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "> 火星にいるあなたへ。\n> こちらは春です。\n> あなたがいない地球は、静かで、よくできていて、\n> だから少しだけ、さびしいです。"}, {"kind": "spacer", "text": ""}, {"kind": "p", "text": "インクが乾くまでのあいだ、私は窓の外を見た。\n空の高いところを、小さな光がゆっくり移動していた。\n誰かが定めた最適な軌道をなぞりながら、\nそれでも確かに、私の好きな人を乗せて。"}, {"kind": "spacer", "text": ""}],
    };

    const state = {
      pages: [],
      currentPageIndex: 0,
      spreadMode: false,
    };

    const readerFrame = document.querySelector(".reader-frame");
    const spreadHost = document.getElementById("spreadHost");
    const pageIndicator = document.getElementById("pageIndicator");
    const prevButton = document.getElementById("prevButton");
    const nextButton = document.getElementById("nextButton");

    initialize();

    function initialize() {
      bindEvents();
      refreshLayout(true);
      goToPage(parseHashPage(), false);
    }

    function bindEvents() {
      nextButton.addEventListener("click", () => goToPage(getNextIndex()));
      prevButton.addEventListener("click", () => goToPage(getPrevIndex()));

      document.addEventListener("keydown", (event) => {
        if (event.key === "ArrowLeft") {
          event.preventDefault();
          goToPage(getNextIndex());
        } else if (event.key === "ArrowRight") {
          event.preventDefault();
          goToPage(getPrevIndex());
        } else if (event.key === "Home") {
          event.preventDefault();
          goToPage(0);
        } else if (event.key === "End") {
          event.preventDefault();
          goToPage(state.spreadMode ? getLastSpreadStartIndex() : state.pages.length - 1);
        }
      });

      let touchStartX = 0;
      let touchStartY = 0;

      spreadHost.addEventListener("touchstart", (event) => {
        const touch = event.changedTouches[0];
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
      }, { passive: true });

      spreadHost.addEventListener("touchend", (event) => {
        const touch = event.changedTouches[0];
        const dx = touch.clientX - touchStartX;
        const dy = touch.clientY - touchStartY;

        if (Math.abs(dx) < 40 || Math.abs(dx) < Math.abs(dy)) {
          return;
        }

        if (dx < 0) {
          goToPage(getNextIndex());
        } else {
          goToPage(getPrevIndex());
        }
      }, { passive: true });

      window.addEventListener("resize", () => {
        const currentIndex = state.currentPageIndex;
        refreshLayout(true);
        goToPage(currentIndex, false);
      });

      window.addEventListener("hashchange", () => {
        goToPage(parseHashPage(), false);
      });
    }

    function refreshLayout(forceRepaginate) {
      const nextSpreadMode = shouldUseSpreadMode();
      const modeChanged = nextSpreadMode !== state.spreadMode;

      state.spreadMode = nextSpreadMode;
      spreadHost.dataset.mode = state.spreadMode ? "double" : "single";
      applyLayoutMetrics();

      if (forceRepaginate || modeChanged || state.pages.length === 0) {
        state.pages = paginateWork(work);
      }
    }

    function shouldUseSpreadMode() {
      return window.innerWidth >= 1100 && window.innerWidth > window.innerHeight * 1.12;
    }

    function applyLayoutMetrics() {
      const root = document.documentElement;
      const compact = window.innerWidth <= 1100;
      const maxFontWidthFillRatio = 0.8;
      const outerPadding = compact ? 32 : 48;
      const verticalPadding = compact ? 32 : 48;
      const spreadGap = compact ? 16 : 24;
      const footerReserve = compact ? 92 : 104;
      const sheetHeight = Math.max(360, window.innerHeight - footerReserve - verticalPadding);
      const aspectWidth = Math.floor(sheetHeight * 3 / 4);
      const maxSingleWidth = Math.max(320, window.innerWidth - outerPadding);
      const maxDoubleWidth = Math.max(220, Math.floor((window.innerWidth - outerPadding - spreadGap) / 2));
      const sheetWidthSingle = Math.min(aspectWidth, maxSingleWidth);
      const sheetWidthDouble = Math.min(aspectWidth, maxDoubleWidth);
      const activeSheetWidth = state.spreadMode ? sheetWidthDouble : sheetWidthSingle;

      const targetLinesPerPage = Math.max(1, READER_CONFIG.columnsPerPage);
      const targetCharsPerLine = Math.max(1, READER_CONFIG.rowsPerColumn);
      const minFont = Number(READER_CONFIG.bodyFontMinPx) || 12;
      const maxFont = Number(READER_CONFIG.bodyFontMaxPx) || 18;
      const lineHeight = compact ? 1.22 : 1.24;
      const letterSpacingEm = 0.03;
      const baseTopPadding = (compact ? 26 : 34) + (compact ? 8 : 10);
      const baseBottomPadding = compact ? 26 : 34;
      const baseSidePadding = compact ? 28 : 40;
      const maxContentHeight = Math.max(240, sheetHeight - baseTopPadding - baseBottomPadding);
      const maxContentWidth = Math.max(160, activeSheetWidth - baseSidePadding * 2);

      const fontSizeFromWidth = maxContentWidth / (targetLinesPerPage * lineHeight);
      const fontSizeFromHeight = maxContentHeight / (targetCharsPerLine * (1 + letterSpacingEm));
      const fontSize = clamp(Math.min(fontSizeFromWidth, fontSizeFromHeight), minFont, maxFont);
      const linePitch = fontSize * lineHeight;
      const contentHeight = Math.round(maxContentHeight);
      const naturalContentWidth = Math.round(linePitch * targetLinesPerPage);
      const minFilledContentWidth = Math.round(maxContentWidth * maxFontWidthFillRatio);
      const isAtMaxFont = fontSize >= maxFont - 0.01;
      const contentWidth = Math.min(
        maxContentWidth,
        isAtMaxFont ? Math.max(naturalContentWidth, minFilledContentWidth) : naturalContentWidth,
      );

      const topPadding = baseTopPadding;
      const bottomPadding = baseBottomPadding;
      const extraHorizontal = Math.max(0, activeSheetWidth - contentWidth);
      const sidePadding = Math.max(baseSidePadding, Math.floor(extraHorizontal / 2));

      root.style.setProperty("--sheet-width-single", `${sheetWidthSingle}px`);
      root.style.setProperty("--sheet-width-double", `${sheetWidthDouble}px`);
      root.style.setProperty("--sheet-height", `${sheetHeight}px`);
      root.style.setProperty("--sheet-pad-top", `${topPadding}px`);
      root.style.setProperty("--sheet-pad-bottom", `${bottomPadding}px`);
      root.style.setProperty("--sheet-pad-right", `${sidePadding}px`);
      root.style.setProperty("--sheet-pad-left", `${sidePadding}px`);
      root.style.setProperty("--content-height", `${contentHeight}px`);
      root.style.setProperty("--content-width", `${contentWidth}px`);
      root.style.setProperty("--lines-per-page", `${targetLinesPerPage}`);
      root.style.setProperty("--body-font-size", `${fontSize.toFixed(2)}px`);
      root.style.setProperty("--body-line-height", lineHeight.toFixed(3));
      root.style.setProperty("--line-pitch", `${linePitch.toFixed(2)}px`);
      root.style.setProperty("--body-letter-spacing", `${letterSpacingEm.toFixed(3)}em`);
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function parseHashPage() {
      const raw = window.location.hash.replace(/^#/, "");
      if (!raw) {
        return 0;
      }

      const page = Number.parseInt(raw, 10);
      return Number.isNaN(page) ? 0 : Math.max(page - 1, 0);
    }

    function normalizePageIndex(index) {
      const maxIndex = Math.max(state.pages.length - 1, 0);
      let normalized = Math.min(Math.max(index, 0), maxIndex);

      if (state.spreadMode && normalized > 0 && normalized % 2 !== 0) {
        normalized -= 1;
      }

      return normalized;
    }

    function getNextIndex() {
      if (!state.spreadMode) {
        return Math.min(state.currentPageIndex + 1, state.pages.length - 1);
      }

      return Math.min(state.currentPageIndex + 2, getLastSpreadStartIndex());
    }

    function getPrevIndex() {
      if (!state.spreadMode) {
        return Math.max(state.currentPageIndex - 1, 0);
      }

      return Math.max(state.currentPageIndex - 2, 0);
    }

    function getLastSpreadStartIndex() {
      const maxIndex = Math.max(state.pages.length - 1, 0);
      return maxIndex > 0 && maxIndex % 2 !== 0 ? maxIndex - 1 : maxIndex;
    }

    function goToPage(index, updateHash = true) {
      if (!state.pages.length) {
        return;
      }

      state.currentPageIndex = normalizePageIndex(index);
      renderSpread();
      updateControls();

      if (updateHash) {
        history.replaceState(null, "", `#${state.currentPageIndex + 1}`);
      }
    }

    function updateControls() {
      const visiblePages = getVisiblePageNumbers();
      pageIndicator.textContent = visiblePages.length === 1
        ? `${visiblePages[0]} / ${state.pages.length}`
        : `${visiblePages[0]}-${visiblePages[1]} / ${state.pages.length}`;

      prevButton.disabled = state.currentPageIndex <= 0;
      nextButton.disabled = state.spreadMode
        ? state.currentPageIndex >= getLastSpreadStartIndex()
        : state.currentPageIndex >= state.pages.length - 1;
    }

    function getVisiblePageNumbers() {
      if (!state.spreadMode) {
        return [state.currentPageIndex + 1];
      }

      const leftIndex = state.currentPageIndex + 1;
      if (leftIndex < state.pages.length) {
        return [state.currentPageIndex + 1, leftIndex + 1];
      }

      return [state.currentPageIndex + 1];
    }

    function renderSpread() {
      const nodes = [];

      if (state.spreadMode) {
        nodes.push(renderSheet(state.currentPageIndex, "right"));
        nodes.push(renderSheet(state.currentPageIndex + 1, "left"));
      } else {
        nodes.push(renderSheet(state.currentPageIndex, "right"));
      }

      spreadHost.replaceChildren(...nodes);
      readerFrame.scrollTop = 0;
      readerFrame.scrollLeft = 0;
    }

    function renderSheet(pageIndex, side) {
      if (pageIndex >= state.pages.length) {
        return createBlankSheet(side);
      }

      const page = state.pages[pageIndex];
      const sheet = document.createElement("article");
      sheet.className = `sheet sheet--${side}`;

      if (page.type === "cover") {
        const cover = document.createElement("div");
        cover.className = "sheet-cover";

        const img = document.createElement("img");
        img.src = work.cover;
        img.alt = work.title + " の表紙";

        const meta = document.createElement("div");
        meta.className = "cover-meta";

        const title = document.createElement("span");
        title.textContent = work.title;

        const pageText = document.createElement("span");
        pageText.textContent = "表紙";

        meta.append(title, pageText);
        cover.append(img, meta);
        sheet.append(cover);
        return sheet;
      }

      const text = document.createElement("div");
      text.className = "sheet-text";
      renderBlocksIntoContainer(text, page.blocks);
      sheet.append(text);
      return sheet;
    }

    function createBlankSheet(side) {
      const sheet = document.createElement("article");
      sheet.className = `sheet sheet--blank sheet--${side}`;
      return sheet;
    }

    function renderBlock(block) {
      if (block.kind === "spacer") {
        const element = document.createElement("div");
        element.className = "spacer";
        return element;
      }

      const tag = /^h[1-3]$/.test(block.kind) ? block.kind : "p";
      const element = document.createElement(tag);
      element.textContent = block.text;
      return element;
    }

    function renderBlocksIntoContainer(container, blocks, isMeasure = false) {
      const inner = document.createElement("div");
      inner.className = "sheet-text-inner";
      if (isMeasure) {
        inner.dataset.measure = "true";
      }

      for (const block of blocks) {
        inner.append(renderBlock(block));
      }

      container.replaceChildren(inner);
      return inner;
    }

    function paginateWork(currentWork) {
      const pages = [{ type: "cover" }];
      const measureSheet = document.createElement("div");
      measureSheet.className = "sheet measure-sheet";

      const measureText = document.createElement("div");
      measureText.className = "sheet-text";
      measureSheet.append(measureText);
      document.body.append(measureSheet);

      let currentBlocks = [];

      for (const block of currentWork.blocks) {
        if (fitsBlocksInPage(measureText, [...currentBlocks, block])) {
          currentBlocks.push(block);
          continue;
        }

        if (currentBlocks.length > 0) {
          pages.push({ type: "text", blocks: currentBlocks });
          currentBlocks = [];
        }

        if (fitsBlocksInPage(measureText, [block])) {
          currentBlocks.push(block);
          continue;
        }

        if (block.kind === "p") {
          for (const splitText of splitParagraphAcrossPages(measureText, block.text)) {
            pages.push({ type: "text", blocks: [{ kind: "p", text: splitText }] });
          }
          continue;
        }

        pages.push({ type: "text", blocks: [block] });
      }

      if (currentBlocks.length > 0) {
        pages.push({ type: "text", blocks: currentBlocks });
      }

      measureSheet.remove();
      return pages;
    }

    function fitsBlocksInPage(measureText, blocks) {
      renderBlocksIntoContainer(measureText, blocks, true);
      return (
        measureText.scrollWidth <= measureText.clientWidth + 1 &&
        measureText.scrollHeight <= measureText.clientHeight + 1
      );
    }

    function splitParagraphAcrossPages(measureText, text) {
      const chunks = [];
      let remaining = text.trim();

      while (remaining) {
        const segment = largestFittingSegment(measureText, remaining);
        if (!segment || segment.length >= remaining.length) {
          chunks.push(remaining);
          break;
        }

        const nextRemaining = remaining.slice(segment.length).trim();
        const adjusted = rebalanceLeadingPunctuation(segment.trim(), nextRemaining);
        chunks.push(adjusted.current);
        remaining = adjusted.remaining;
      }

      return chunks.filter(Boolean);
    }

    function largestFittingSegment(measureText, text) {
      const sentenceTokens = splitIntoSentenceTokens(text);
      if (sentenceTokens.length > 1) {
        const sentenceMatch = largestFittingTokenPrefix(measureText, sentenceTokens);
        if (sentenceMatch) {
          return sentenceMatch;
        }
      }

      const charTokens = Array.from(text);
      return largestFittingTokenPrefix(measureText, charTokens) || text;
    }

    function largestFittingTokenPrefix(measureText, tokens) {
      let low = 1;
      let high = tokens.length;
      let best = "";

      while (low <= high) {
        const mid = Math.floor((low + high) / 2);
        const candidate = tokens.slice(0, mid).join("").trim();

        if (!candidate) {
          low = mid + 1;
          continue;
        }

        if (fitsBlocksInPage(measureText, [{ kind: "p", text: candidate }])) {
          best = candidate;
          low = mid + 1;
        } else {
          high = mid - 1;
        }
      }

      return best;
    }

    function splitIntoSentenceTokens(text) {
      const rawTokens = text.match(/[^。！？!?]+[。！？!?]?["」』）】]*|.+$/gu);
      return rawTokens ? rawTokens.map((token) => token.trim()).filter(Boolean) : [text];
    }

    function rebalanceLeadingPunctuation(current, remaining) {
      if (!remaining) {
        return { current, remaining: "" };
      }

      const chars = Array.from(remaining);
      const leading = [];
      while (chars.length && "、。，．！？!?」』）】".includes(chars[0])) {
        leading.push(chars.shift());
      }

      if (leading.length === 0) {
        return { current, remaining };
      }

      return {
        current: current + leading.join(""),
        remaining: chars.join("").trimStart(),
      };
    }
  </script>
</body>
